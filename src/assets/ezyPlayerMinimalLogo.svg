    <!-- Parentheses -->
    <text x="150" y="300" font-size="180" fill="white" font-family="Arial">(</text>
    <text x="350" y="300" font-size="180" fill="white" font-family="Arial">)</text>

    <!-- e (baixada uns píxels respecte el logo d'ezyRider) -->
